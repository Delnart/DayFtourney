services:
  # --- REST API (Node.js) ---
  - type: web
    name: dayftourn-api
    runtime: node
    rootDir: api
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: API_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # Set to your deployed frontend URL, e.g. https://your-frontend.onrender.com
      - key: ALLOWED_ORIGINS
        sync: false   # Set in Render dashboard: your Netlify URL

  # --- Discord Bot (Python) — runs as Web Service so Render keeps it alive ---
  - type: web
    name: dayftourn-bot
    runtime: python
    rootDir: bot
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GUILD_ID
        sync: false
      - key: RESULTS_CHANNEL_ID
        sync: false
      - key: API_URL
        sync: false   
      - key: API_SECRET
        fromService:
          name: dayftourn-api
          type: web
          envVarKey: API_SECRET
